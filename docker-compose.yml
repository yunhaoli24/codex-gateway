x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "1m"
    max-file: "3"

services:
  codex-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-gateway
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      BROWSER_PREVIEW_DOMAIN: ${BROWSER_PREVIEW_DOMAIN:-cloudawn.top}
      CODEX_GATEWAY_DB_PATH: /data/codex-gateway.db
      CODEX_GATEWAY_CONFIG_SECRET: ${CODEX_GATEWAY_CONFIG_SECRET:?CODEX_GATEWAY_CONFIG_SECRET is required}
    volumes:
      - ./data:/data
    networks:
      - web-common

networks:
  web-common:
    external: true
