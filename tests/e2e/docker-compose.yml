services:
  bark-target:
    image: node:22-bookworm
    command: ["node", "/app/bark-server.mjs"]
    environment:
      BARK_TEST_PORT: "8080"
      BARK_TEST_LOG: /requests/requests.jsonl
    volumes:
      - ./bark-server.mjs:/app/bark-server.mjs:ro
      - bark-requests:/requests

  ssh-target:
    build:
      context: ./docker
      args:
        CODEX_CLI_VERSION: ${E2E_CODEX_CLI_VERSION:-0.140.0}
        E2E_UID: ${E2E_UID:-12345}
        E2E_GID: ${E2E_GID:-12345}
    environment:
      CODEX_HOME: /home/codex/.codex
    volumes:
      - ../..:/workspace/codex-gateway

  test-runner:
    build:
      context: ../..
      dockerfile: tests/e2e/runner.Dockerfile
    depends_on:
      - ssh-target
      - bark-target
    environment:
      CI: ${CI:-}
      E2E_CONTAINERIZED: "1"
      E2E_SOURCE_DIR: /workspace/source
      E2E_CODEX_HOME: /codex-auth
      E2E_REMOTE_HOST: ssh-target
      E2E_REMOTE_PORT: "22"
      E2E_REMOTE_USERNAME: codex
      E2E_REMOTE_PASSWORD: codex
      E2E_REMOTE_PROJECT_PATH: /workspace/codex-gateway
      E2E_CODEX_CLI_VERSION: ${E2E_CODEX_CLI_VERSION:-0.140.0}
      E2E_CODEX_MODEL: ${E2E_CODEX_MODEL:-gpt-5.4-mini}
      E2E_BARK_SERVER_URL: http://bark-target:8080
      E2E_BARK_REQUEST_LOG: /bark-requests/requests.jsonl
      PLAYWRIGHT_BASE_URL: http://codex.127.0.0.1.nip.io:3100
      HOME: /home/pwuser
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ${E2E_CODEX_HOME:-${HOME}/.codex}:/codex-auth:ro
      - ../../test-results:/workspace/codex-gateway/test-results
      - bark-requests:/bark-requests
      - runner-home:/home/pwuser
    working_dir: /workspace/codex-gateway

volumes:
  bark-requests:
  runner-home:
